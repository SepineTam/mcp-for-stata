site_name: Stata-MCP Documents

theme:
  name: material
  features:
    #  Allows copying code blocks
    - content.code.copy
    # Allows selecting code blocks
    - content.code.select
    # Shows the current path in the sidebar
    - navigation.path
    # Shows sections in the sidebar
    - navigation.sections
    # Shows sections expanded by default
    - navigation.expand
    # Enables annotations in code blocks
    - content.code.annotate
    # Shows previous/next page navigation at bottom
    - navigation.footer
    # Back to top button
    - navigation.top
  palette:  # The palette part is referred from opendatalab/MinerU
    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      scheme: default
      primary: black
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  font:
    text: Inter
    code: JetBrains Mono
  logo: https://example-data.statamcp.com/android-chrome-512x512.png
  favicon: https://r2.statamcp.com/favicon.ico

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/sepinetam/stata-mcp
      name: GitHub
    - icon: material/email
      link: mailto:sepinetam@gmail.com
      name: E-mail

copyright: &copyright |
  Copyright &copy; 2025 - present <a href="https://github.com/sepinetam">Sepine Tam</a>. All Right Reserved. 

plugins:
  - search
  - i18n:
      languages:
        - locale: en
          name: English
          default: true
        - locale: zh
          name: 简体中文

nav:
  - Home: index.md
  - Overview: overview.md
  - CLI Reference: cli.md
  - Usage: usage.md
  - Docker: docker.md
  - Claude Plugin: claude-plugin.md
  - Clients: clients.md
  - Configuration: configuration.md
  - Security: security.md
  - Monitoring: monitoring.md
  - Tools: mcp/tools.md
  - Resources: mcp/resources.md

  - API: api/overview.md

  - Agents:
      - Summary: agents/index.md
      - Claude Code: agents/claude_code.md
      - OpenClaw: agents/openclaw.md

  - CoreTech:
      - Stata Finder: core/stata/finder.md
      - Stata Runner: core/stata/do.md
      - Stata Help: core/stata/help.md
      - Stata package: core/stata/package.md

repo_name: mcp-for-stata
repo_url: https://github.com/SepineTam/mcp-for-stata
site_url: https://sepinetam.github.io/mcp-for-stata/

markdown_extensions:
  - md_in_html
