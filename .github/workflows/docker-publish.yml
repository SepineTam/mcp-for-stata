name: Build and Push Docker Images

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - stata-version: 19
            install-url: https://public.econ.duke.edu/stata/installers/19/StataNow19Linux64.tar.gz
            tags: |
              ghcr.io/${{ github.repository_owner }}/stata-mcp:v${{ github.event.release.tag_name }}-s19
              ghcr.io/${{ github.repository_owner }}/stata-mcp:latest
              ${{ secrets.DOCKERHUB_USERNAME }}/stata-mcp:v${{ github.event.release.tag_name }}-s19
              ${{ secrets.DOCKERHUB_USERNAME }}/stata-mcp:latest
          - stata-version: 18
            install-url: https://public.econ.duke.edu/stata/installers/18/Stata18Linux64.tar.gz
            tags: |
              ghcr.io/${{ github.repository_owner }}/stata-mcp:v${{ github.event.release.tag_name }}-s18
              ${{ secrets.DOCKERHUB_USERNAME }}/stata-mcp:v${{ github.event.release.tag_name }}-s18
          - stata-version: 17
            install-url: https://public.econ.duke.edu/stata/installers/17/Stata17Linux64.tar.gz
            tags: |
              ghcr.io/${{ github.repository_owner }}/stata-mcp:v${{ github.event.release.tag_name }}-s17
              ${{ secrets.DOCKERHUB_USERNAME }}/stata-mcp:v${{ github.event.release.tag_name }}-s17
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          build-args: |
            STATA_INSTALL_URL=${{ matrix.install-url }}
          push: true
          tags: ${{ matrix.tags }}
