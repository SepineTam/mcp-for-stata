name: Build and Push Docker Images

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version tag'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - stata-version: 19
            install-url: https://public.econ.duke.edu/stata/installers/19/StataNow19Linux64.tar.gz
            suffix: s19
            latest: true
          - stata-version: 18
            install-url: https://public.econ.duke.edu/stata/installers/18/Stata18Linux64.tar.gz
            suffix: s18
            latest: false
          - stata-version: 17
            install-url: https://public.econ.duke.edu/stata/installers/17/Stata17Linux64.tar.gz
            suffix: s17
            latest: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate tags
        id: tags
        env:
          VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.event.release.tag_name }}
          SUFFIX: ${{ matrix.suffix }}
          DOCKER_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          REPO_OWNER: ${{ github.repository_owner }}
          IS_LATEST: ${{ matrix.latest }}
        run: |
          TAGS="ghcr.io/${REPO_OWNER}/stata-mcp:${VERSION}-${SUFFIX}"
          TAGS="${TAGS},${DOCKER_USER}/stata-mcp:${VERSION}-${SUFFIX}"

          if [ "${IS_LATEST}" = "true" ]; then
            TAGS="${TAGS},ghcr.io/${REPO_OWNER}/stata-mcp:latest"
            TAGS="${TAGS},${DOCKER_USER}/stata-mcp:latest"
          fi

          echo "tags=${TAGS}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          build-args: |
            STATA_INSTALL_URL=${{ matrix.install-url }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
