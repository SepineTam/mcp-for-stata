name: Build and Push Docker Images

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version tag'
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      repo_owner: ${{ steps.version.outputs.repo_owner }}
    steps:
      - name: Get version
        id: version
        env:
          RAW_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.event.release.tag_name }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          # Remove 'v' prefix
          VERSION="${RAW_VERSION#v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          # Lowercase repo owner
          REPO_OWNER_LOWER=$(echo "${REPO_OWNER}" | tr '[:upper:]' '[:lower:]')
          echo "repo_owner=${REPO_OWNER_LOWER}" >> $GITHUB_OUTPUT

  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        CAPTURE_VERSION: ["19_5", "18_5", "18"]
        BASIS: ["mp", "se", "be"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          build-args: |
            CAPTURE_VERSION=${{ matrix.CAPTURE_VERSION }}
            BASIS=${{ matrix.BASIS }}
          push: true
          tags: |
            ghcr.io/${{ needs.prepare.outputs.repo_owner }}/stata-mcp_${{ matrix.CAPTURE_VERSION }}_${{ matrix.BASIS }}:${{ needs.prepare.outputs.version }}
            ghcr.io/${{ needs.prepare.outputs.repo_owner }}/stata-mcp_${{ matrix.CAPTURE_VERSION }}_${{ matrix.BASIS }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/stata-mcp_${{ matrix.CAPTURE_VERSION }}_${{ matrix.BASIS }}:${{ needs.prepare.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/stata-mcp_${{ matrix.CAPTURE_VERSION }}_${{ matrix.BASIS }}:latest

